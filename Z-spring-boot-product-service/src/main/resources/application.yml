spring:
  application:
    name: product-service
  config:
    import: optional:configserver:http://localhost:8001
  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher
  boot:
    admin:
      client:
        url: http://localhost:8080/
        enabled: true
        instance:
          service-base-url: http://localhost:9001

server:
  port: 9001

management:
  endpoints:
    web:
      exposure:
        include: "*"